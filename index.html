<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IA Captação Oral Unic</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; padding: 0; background-color: #f4f4f4; }
        .screen { display: none; }
        .active { display: block; }
        /* Login */
        .login { display: flex; justify-content: center; align-items: center; height: 100vh; background-color: #e0f7fa; }
        .login-form { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        input { display: block; margin: 10px 0; padding: 10px; width: 100%; }
        button { padding: 10px; background: #007bff; color: white; border: none; cursor: pointer; }
        /* Kanban */
        .kanban { padding: 20px; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .hamburger { cursor: pointer; font-size: 24px; }
        .menu { display: none; position: absolute; background: white; border: 1px solid #ccc; padding: 10px; }
        .menu.show { display: block; }
        .columns { display: flex; gap: 20px; }
        .column { flex: 1; background: #fff; padding: 10px; border-radius: 8px; min-height: 400px; }
        .column h3 { font-size: 14px; margin-bottom: 10px; }
        .card { background: #f9f9f9; padding: 10px; margin-bottom: 10px; border-radius: 4px; cursor: move; }
        .score-bar { width: 100%; height: 10px; background: #ddd; margin: 5px 0; }
        .score-fill { height: 100%; background: #4caf50; }
        /* Dashboard */
        .dashboard { padding: 20px; }
        .kpi-cards { display: flex; gap: 20px; margin-bottom: 20px; }
        .kpi-card { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 0 5px rgba(0,0,0,0.1); flex: 1; text-align: center; }
        .charts { display: flex; gap: 20px; }
        .chart { flex: 1; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 0 5px rgba(0,0,0,0.1); }
        canvas { max-width: 100%; }
    </style>
</head>
<body>
    <div id="login" class="screen active login">
        <div class="login-form">
            <h2>Login</h2>
            <input type="text" placeholder="Usuário" id="username">
            <input type="password" placeholder="Senha" id="password">
            <button onclick="showScreen('kanban')">Login</button>
        </div>
    </div>
    <div id="kanban" class="screen kanban">
        <div class="header">
            <div class="hamburger" onclick="toggleMenu()">☰</div>
            <div id="menu" class="menu">
                <a href="#" onclick="showScreen('dashboard')">Dashboard</a><br>
                <a href="#">Configuração</a><br>
                <a href="#" onclick="showScreen('login')">Logout</a>
            </div>
            <h1>Kanban</h1>
        </div>
        <div class="columns" id="kanban-columns">
            <div class="column" id="leads-novos" style="background-color: #E3F2FD;">
                <h3>LEADS NOVOS</h3>
            </div>
            <div class="column" id="em-tratamento" style="background-color: #E8F5E9;">
                <h3>EM TRATAMENTO</h3>
            </div>
            <div class="column" id="agendado" style="background-color: #FFFDE7;">
                <h3>AGENDADO</h3>
            </div>
            <div class="column" id="faltou" style="background-color: #FFEBEE;">
                <h3>FALTOU</h3>
            </div>
            <div class="column" id="arquivo" style="background-color: #F5F5F5;">
                <h3>ARQUIVO</h3>
            </div>
        </div>
    </div>
    <div id="dashboard" class="screen dashboard">
        <div class="header">
            <div class="hamburger" onclick="toggleMenu()">☰</div>
            <div id="menu" class="menu">
                <a href="#" onclick="showScreen('kanban')">Kanban</a><br>
                <a href="#">Configuração</a><br>
                <a href="#" onclick="showScreen('login')">Logout</a>
            </div>
            <h1>Dashboard de KPIs</h1>
        </div>
        <div class="kpi-cards">
            <div class="kpi-card"><h3>Total de Leads</h3><p>25</p></div>
            <div class="kpi-card"><h3>Taxa de Conversão</h3><p>20%</p></div>
            <div class="kpi-card"><h3>Leads Agendados</h3><p>5</p></div>
            <div class="kpi-card"><h3>Leads Faltosos</h3><p>5</p></div>
        </div>
        <div class="charts">
            <div class="chart"><canvas id="pieChart"></canvas></div>
            <div class="chart"><canvas id="barChart"></canvas></div>
            <div class="chart"><canvas id="lineChart"></canvas></div>
        </div>
        <button onclick="showScreen('kanban')">Voltar ao Kanban</button>
    </div>
    <script>
        const leads = [
            { name: 'João Silva', service: 'Implantes', score: 85, date: '2023-10-01' },
            { name: 'Maria Oliveira', service: 'Invisalign', score: 92, date: '2023-10-02' },
            { name: 'Pedro Santos', service: 'Implantes', score: 78, date: '2023-10-03' },
            { name: 'Ana Costa', service: 'Clínico', score: 65, date: '2023-10-04' },
            { name: 'Carlos Pereira', service: 'Implantes', score: 88, date: '2023-10-05' },
            { name: 'Beatriz Lima', service: 'Implantes', score: 95, date: '2023-10-06' },
            { name: 'Fernando Alves', service: 'Invisalign', score: 70, date: '2023-10-07' },
            { name: 'Gabriela Rocha', service: 'Implantes', score: 82, date: '2023-09-30' },
            { name: 'Henrique Mendes', service: 'Implantes', score: 90, date: '2023-09-29' },
            { name: 'Isabela Nunes', service: 'Clínico', score: 55, date: '2023-09-28' },
            { name: 'João Pedro', service: 'Implantes', score: 87, date: '2023-09-27' },
            { name: 'Karla Souza', service: 'Invisalign', score: 93, date: '2023-09-26' },
            { name: 'Lucas Ferreira', service: 'Implantes', score: 76, date: '2023-09-25' },
            { name: 'Mariana Dias', service: 'Implantes', score: 89, date: '2023-09-24' },
            { name: 'Nicolas Gomes', service: 'Implantes', score: 94, date: '2023-09-23' },
            { name: 'Olivia Barbosa', service: 'Invisalign', score: 68, date: '2023-09-22' },
            { name: 'Paulo Carvalho', service: 'Implantes', score: 81, date: '2023-09-21' },
            { name: 'Quintino Ramos', service: 'Implantes', score: 96, date: '2023-09-20' },
            { name: 'Rosa Teixeira', service: 'Clínico', score: 60, date: '2023-09-19' },
            { name: 'Sofia Lopes', service: 'Implantes', score: 84, date: '2023-09-18' },
            { name: 'Tiago Martins', service: 'Implantes', score: 91, date: '2023-09-17' },
            { name: 'Ursula Vieira', service: 'Invisalign', score: 73, date: '2023-09-16' },
            { name: 'Vitor Andrade', service: 'Implantes', score: 79, date: '2023-09-15' },
            { name: 'Wanda Castro', service: 'Implantes', score: 86, date: '2023-09-14' },
            { name: 'Xavier Pinto', service: 'Implantes', score: 97, date: '2023-09-13' }
        ];
        const columns = ['leads-novos', 'em-tratamento', 'agendado', 'faltou', 'arquivo'];
        function showScreen(screenId) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(screenId).classList.add('active');
        }
        function toggleMenu() {
            document.getElementById('menu').classList.toggle('show');
        }
        function renderKanban() {
            columns.forEach((colId, index) => {
                const col = document.getElementById(colId);
                const start = index * 5;
                const end = start + 5;
                leads.slice(start, end).forEach(lead => {
                    const card = document.createElement('div');
                    card.className = 'card';
                    card.draggable = true;
                    card.innerHTML = `
                        <strong>${lead.name}</strong><br>
                        Serviço: ${lead.service}<br>
                        <div class="score-bar"><div class="score-fill" style="width: ${lead.score}%"></div></div>
                        Score: ${lead.score}<br>
                        Data: ${lead.date}
                    `;
                    card.addEventListener('dragstart', (e) => {
                        e.dataTransfer.setData('text/plain', lead.name);
                    });
                    col.appendChild(card);
                });
                col.addEventListener('dragover', (e) => e.preventDefault());
                col.addEventListener('drop', (e) => {
                    e.preventDefault();
                    const leadName = e.dataTransfer.getData('text/plain');
                    const lead = leads.find(l => l.name === leadName);
                    if (lead) {
                        // Simple move: remove from old, add to new
                        const oldCol = e.target.closest('.column');
                        const newCol = col;
                        if (oldCol !== newCol) {
                            oldCol.querySelector(`[data-name="${leadName}"]`).remove();
                            const newCard = document.createElement('div');
                            newCard.className = 'card';
                            newCard.draggable = true;
                            newCard.setAttribute('data-name', leadName);
                            newCard.innerHTML = `
                                <strong>${lead.name}</strong><br>
                                Serviço: ${lead.service}<br>
                                <div class="score-bar"><div class="score-fill" style="width: ${lead.score}%"></div></div>
                                Score: ${lead.score}<br>
                                Data: ${lead.date}
                            `;
                            newCard.addEventListener('dragstart', (e) => {
                                e.dataTransfer.setData('text/plain', lead.name);
                            });
                            newCol.appendChild(newCard);
                        }
                    }
                });
            });
        }
        function renderCharts() {
            const serviceCounts = { Implantes: 0, Invisalign: 0, Clínico: 0 };
            leads.forEach(l => serviceCounts[l.service]++);
            new Chart(document.getElementById('pieChart'), {
                type: 'pie',
                data: {
                    labels: Object.keys(serviceCounts),
                    datasets: [{ data: Object.values(serviceCounts), backgroundColor: ['#ff6384', '#36a2eb', '#cc65fe'] }]
                }
            });
            const statusCounts = { 'LEADS NOVOS': 5, 'EM TRATAMENTO': 5, 'AGENDADO': 5, 'FALTOU': 5, 'ARQUIVO': 5 };
            new Chart(document.getElementById('barChart'), {
                type: 'bar',
                data: {
                    labels: Object.keys(statusCounts),
                    datasets: [{ label: 'Leads', data: Object.values(statusCounts), backgroundColor: '#4bc0c0' }]
                }
            });
            const dailyLeads = {};
            leads.forEach(l => {
                dailyLeads[l.date] = (dailyLeads[l.date] || 0) + 1;
            });
            new Chart(document.getElementById('lineChart'), {
                type: 'line',
                data: {
                    labels: Object.keys(dailyLeads).sort(),
                    datasets: [{ label: 'Leads por Dia', data: Object.values(dailyLeads), borderColor: '#ff9f40' }]
                }
            });
        }
        document.addEventListener('DOMContentLoaded', () => {
            renderKanban();
            renderCharts();
        });
    </script>
</body>
</html>
